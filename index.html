<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню Red Sun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>НАШЕ МЕНЮ</h1>
        <p>Традиции китайского вкуса в каждом блюде</p>
    </header>

    <main class="menu-container">
        <div class="menu-item" onclick="highlight(this)">
            <img src="6.jpeg" alt="Блюдо">
            <div class="info">
                <h3>6 Крабовые палочки</h3>
                <p class="price">450 сом</p>
            </div>
        </div>

        <div class="menu-item" onclick="highlight(this)">
            <img src="15.jpeg" alt="Блюдо">
            <div class="info">
                <h3>15 Фарш из креветок</h3>
                <p class="price">1160 сом</p>
            </div>
        </div>

        <div class="menu-item" onclick="highlight(this)">
            <img src="16.jpeg" alt="Блюдо">
            <div class="info">
                <h3>16 Свежая говяжья нарезка</h3>
                <p class="price">670 сом</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
